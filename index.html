<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой ранг Dota 2</title>
<style>
  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
  }
  canvas {
    width: 128px;   /* можешь поставить 256 если хочешь крупнее */
    height: 128px;
  }
</style>
<link rel="icon" href="data:,">
</head>
<body>
<canvas id="rank-canvas" width="256" height="256"></canvas>

<script>
// ========== ВСТАВЬ СВОИ ССЫЛКИ СЮДА ==========
const MEDAL_URL = "https://riki.dotabuff.com/c/63d15a899352cbd438e65ceec2528f21415011eb/68747470733a2f2f7261772e67697468756275736572636f6e74656e742e636f6d2f646f7461627566662f70616e6f72616d612f6d61737465722f70616e6f72616d612f696d616765732f72616e6b5f746965725f69636f6e732f72616e6b335f7073642e706e67";
const PIP_URL   = "https://riki.dotabuff.com/c/44669a2809dcd9ec85e457c2125cf4253343a65d/68747470733a2f2f7261772e67697468756275736572636f6e74656e742e636f6d2f646f7461627566662f70616e6f72616d612f6d61737465722f70616e6f72616d612f696d616765732f72616e6b5f746965725f69636f6e732f706970325f7073642e706e67";
// ===========================================

async function drawRank() {
  const canvas = document.getElementById('rank-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 256);

  try {
    // Загружаем медаль и рисуем
    const medalImg = await loadImage(MEDAL_URL);
    ctx.drawImage(medalImg, 0, 0, 256, 256);

    // Если есть звёзды – загружаем и рисуем поверх
    if (PIP_URL) {
      const pipImg = await loadImage(PIP_URL);
      ctx.drawImage(pipImg, 0, 0, 256, 256);
    }
  } catch (e) {
    console.error('Ошибка загрузки иконок:', e);
  }
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`Не загрузилось: ${url}`));
    img.src = url;
  });
}

drawRank();
</script>
</body>
</html>
