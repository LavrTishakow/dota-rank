<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
  }
  #rank-img {
    width: 128px;
    height: 128px;
  }
</style>
</head>
<body>
<img id="rank-img" alt="Ранг">
<script>
const STEAM_ID = '109727253';   // ← ПОМЕНЯЙ НА СВОЙ
const API_URL = `https://api.opendota.com/api/players/${STEAM_ID}`;
const ICON_BASE = 'https://raw.githubusercontent.com/odota/dotaconstants/master/build/rank_icons/rank_icon_';

async function updateRank() {
  const img = document.getElementById('rank-img');
  try {
    const response = await fetch(API_URL);
    const data = await response.json();
    const tier = data.rank_tier;
    if (tier && tier > 0) {
      img.src = `${ICON_BASE}${tier}.png`;
    } else {
      img.src = '';  // нет ранга — иконка пропадёт
    }
  } catch(e) {
    console.error('Ошибка загрузки ранга:', e);
    img.src = '';
  }
}

updateRank();
setInterval(updateRank, 120000); // обновление каждые 2 минуты
</script>
</body>
</html>
