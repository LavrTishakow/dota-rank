<script>
const STEAM_ID = '109727253';   // твой Steam ID
const API_URL = `https://api.opendota.com/api/players/${STEAM_ID}`;

// Функция генерации URL для Dotabuff CDN
function getDotabuffIconUrl(originalUrl) {
  const hexUrl = Array.from(new TextEncoder().encode(originalUrl))
    .map(b => b.toString(16).padStart(2, '0')).join('');
  const hash = window.md5(originalUrl);
  return `https://riki.dotabuff.com/c/${hash}/${hexUrl}`;
}

async function updateRank() {
  const canvas = document.getElementById('rank-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 256);

  try {
    const resp = await fetch(API_URL);
    const data = await resp.json();
    const tier = data.rank_tier;
    console.log('rank_tier:', tier);
    if (!tier || tier < 10) return;

    const medal = Math.floor(tier / 10);   // 1=Herald, 3=Crusader, ...
    const stars = tier % 10;

    // Исходные URL (которые у Dotabuff хранятся в кеше)
    const medalRaw = `https://raw.githubusercontent.com/dotabuff/panorama/master/panorama/images/rank_tier_icons/rank${medal}_psd.png`;
    const pipRaw   = `https://raw.githubusercontent.com/dotabuff/panorama/master/panorama/images/rank_tier_icons/pip${stars}_psd.png`;

    const medalUrl = getDotabuffIconUrl(medalRaw);
    // Загружаем медаль
    const medalImg = await loadImage(medalUrl);
    ctx.drawImage(medalImg, 0, 0, 256, 256);

    if (stars > 0) {
      const pipUrl = getDotabuffIconUrl(pipRaw);
      const pipImg = await loadImage(pipUrl);
      ctx.drawImage(pipImg, 0, 0, 256, 256);
    }

    console.log('Собрано: medal', medal, 'stars', stars);
  } catch (e) {
    console.error('Ошибка:', e);
  }
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`Не загрузилось: ${url}`));
    img.src = url;
  });
}

// Первый запуск и автообновление
updateRank();
setInterval(updateRank, 120000);
</script>
