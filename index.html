<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой ранг Dota 2</title>
<style>
  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    height: 100vh;
  }
  #rank-img {
    width: 128px;
    height: 128px;
  }
</style>
<link rel="icon" href="data:,">
</head>
<body>
<img id="rank-img" alt="Ранг">
<script>
const STEAM_ID = '109727253';   // твой Steam ID
const API_URL = `https://api.opendota.com/api/players/${STEAM_ID}`;
// Иконки со звёздами лежат на CDN Stratz
const ICON_BASE = 'https://stratz.com/assets/images/dota2/rank_icons/rank_';

async function updateRank() {
  const img = document.getElementById('rank-img');
  try {
    const response = await fetch(API_URL);
    const data = await response.json();
    const tier = data.rank_tier;
    console.log('rank_tier:', tier);
    if (tier && tier > 0) {
      img.src = `${ICON_BASE}${tier}.png?t=${Date.now()}`;
      console.log('Иконка:', img.src);
    } else {
      img.src = '';
      console.warn('Ранг не откалиброван');
    }
  } catch(e) {
    console.error('Ошибка API:', e);
    img.src = '';
  }
}

updateRank();
setInterval(updateRank, 120000); // обновление каждые 2 минуты
</script>
</body>
</html>
